<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>永吉涼麵點餐系統</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #FDFBF7; -webkit-tap-highlight-color: transparent; }
        .tab-active { border-bottom: 4px solid #E67E22; color: #E67E22; font-weight: 900; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const MENU = {
            "涼麵": [
                { name: "原味", pS: 50, pL: 60 }, { name: "芥末", pS: 50, pL: 60 },
                { name: "素食", pS: 50, pL: 60 }, { name: "雞絲", pS: 60, pL: 70 },
                { name: "三絲", pS: 60, pL: 70 }, { name: "炸醬", pS: 60, pL: 70 },
                { name: "泰式", pS: 65, pL: 75, fixed: "大辣" }
            ],
            "熱食": [
                { name: "炒麵", pS: 50, pL: 60 }, { name: "魯肉飯", pS: 45, pL: 55 },
                { name: "雞肉飯", pS: 45, pL: 55 }, { name: "味噌蛋麵", price: 65 }, { name: "炸醬麵", price: 60 }
            ],
            "湯類": [
                { name: "味噌", base: 25 }, { name: "紫菜", base: 25 },
                { name: "蘿蔔", base: 30 }, { name: "蛋花", base: 30 }, { name: "貢丸", base: 40 }
            ],
            "小菜": [
                { name: "魯蛋", price: 15 }, { name: "海帶", price: 10 }, { name: "小豆干", price: 10 },
                { name: "大豆干", price: 20 }, { name: "素雞", price: 15 }, { name: "蘿蔔", price: 15 },
                { name: "百頁", price: 20 }, { name: "麵腸", price: 20 }, { name: "素肚", price: 30 }, { name: "杏鮑菇", price: 30 }
            ]
        };

        const App = () => {
            const [page, setPage] = useState('home');
            const [type, setType] = useState('');
            const [table, setTable] = useState('');
            const [people, setPeople] = useState(1);
            const [tab, setTab] = useState('涼麵');
            const [cart, setCart] = useState([]);
            
            // 小菜全域設定
            const [sauce, setSauce] = useState('蒜蓉醬油');
            const [onion, setOnion] = useState('加蔥');
            const [spicy, setSpicy] = useState('不辣');
            
            const [itemSpicy, setItemSpicy] = useState({});
            const [counts, setCounts] = useState({});
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);

            const addToCart = (item, label = '', extra = '') => {
                const key = `${item.name}-${label}-${extra}`;
                const num = counts[key] || 1;
                let p = item.price || item.base || (label === '大' ? item.pL : item.pS);
                if (extra === '加蛋') p = 40;
                if (extra === '加貢丸') p = 45;
                if (extra === '綜合') p = 60;

                const note = tab === '小菜' 
                    ? `(${sauce}, ${onion}${type === '外帶' ? ', ' + spicy : ''})`
                    : `(${type === '外帶' ? (item.fixed || itemSpicy[item.name] || '不辣') : '內用'})`;

                setCart([...cart, { id: Date.now(), title: `${item.name}${label}${extra}`, p, num, note }]);
                setCounts({...counts, [key]: 1});
            };

            const sendOrder = async () => {
                setLoading(true);
                const orderId = "#" + Math.floor(Math.random()*899+100);
                const time = new Date().toLocaleString('zh-TW');
                const data = {
                    type, table, people,
                    items: cart.map(i => `${i.title}${i.note} x ${i.num}`).join(', '),
                    total: cart.reduce((s,i)=>s+(i.p*i.num), 0),
                    orderId, time, cart: [...cart]
                };
                setResult(data);
                try {
                    await fetch('https://script.google.com/macros/s/AKfycby4QS3nhpwUZYMFJBY5REXflTuzat3IPX6m2qKkOurpijIS1gQWpsxG3lFk9CUtQM62/exec', { 
                        method: 'POST', mode: 'no-cors', body: JSON.stringify({...data, key: "yongji888"}) 
                    });
                } catch(e){}
                setPage('done');
                setLoading(false);
            };

            if (page === 'home') return (
                <div className="flex flex-col items-center justify-center min-h-screen p-6">
                    <div className="w-40 h-40 bg-red-700 rounded-full flex items-center justify-center text-white text-3xl font-black mb-12 shadow-xl">永吉<br/>涼麵</div>
                    <button onClick={()=>{setType('內用'); setPage('table');}} className="w-full max-w-xs py-10 bg-white border-4 border-orange-500 text-orange-600 rounded-3xl text-4xl font-black mb-6 shadow-md">內用</button>
                    <button onClick={()=>{setType('外帶'); setPage('menu');}} className="w-full max-w-xs py-10 bg-orange-500 text-white rounded-3xl text-4xl font-black shadow-md">外帶</button>
                </div>
            );

            if (page === 'table') return (
                <div className="flex flex-col items-center justify-center min-h-screen p-6">
                    <div className="bg-white p-6 rounded-3xl shadow-lg w-full max-w-sm border">
                        <h2 className="text-2xl font-black mb-4 text-center">用餐設定</h2>
                        <label className="block mb-2 font-bold">1. 人數：</label>
                        <input type="number" value={people} onChange={(e)=>setPeople(e.target.value)} className="w-full p-4 border-2 border-orange-500 rounded-xl text-center text-2xl mb-6" />
                        <label className="block mb-4 font-bold">2. 桌號：</label>
                        <div className="grid grid-cols-4 gap-2">
                            {[1,2,3,5,6,7,8,9,10,11].map(n => (
                                <button key={n} onClick={()=>{setTable(n); setPage('menu');}} className="py-4 bg-orange-50 border border-orange-200 text-orange-700 rounded-xl text-xl font-black">{n}</button>
                            ))}
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="max-w-4xl mx-auto pb-40">
                    <header className="bg-white p-4 sticky top-0 z-50 shadow-sm flex justify-between items-center no-print">
                        <span className="text-2xl font-black text-red-700">永吉涼麵</span>
                        <span className="bg-orange-100 px-3 py-1 rounded-full font-bold text-orange-700 text-sm">{type} {table && `${table}桌`}</span>
                    </header>
                    <nav className="flex bg-white sticky top-[64px] z-40 border-b no-print">
                        {Object.keys(MENU).map(k => (
                            <button key={k} onClick={()=>setTab(k)} className={`flex-1 py-4 text-xl ${tab === k ? 'tab-active' : 'text-gray-400 font-bold'}`}>{k}</button>
                        ))}
                    </nav>
                    <main className="p-4 space-y-4 no-print">
                        {tab === '小菜' && (
                            <div className="bg-orange-600 p-5 rounded-3xl text-white shadow-lg space-y-3">
                                <h3 className="font-black">🥗 小菜整盤口味設定</h3>
                                <div className="grid grid-cols-3 gap-2">
                                    {['蒜蓉醬油','素醬油','不加醬'].map(s => <button key={s} onClick={()=>setSauce(s)} className={`py-2 rounded-lg text-xs font-bold border ${sauce===s?'bg-white text-orange-600':'border-orange-400'}`}>{s}</button>)}
                                </div>
                                <div className="grid grid-cols-2 gap-2">
                                    {['加蔥','不加蔥'].map(o => <button key={o} onClick={()=>setOnion(o)} className={`py-2 rounded-lg text-xs font-bold border ${onion===o?'bg-white text-orange-600':'border-orange-400'}`}>{o}</button>)}
                                </div>
                                {type === '外帶' && <div className="flex gap-1 overflow-x-auto">
                                    {['不辣','微辣','小辣','中辣','大辣'].map(s => <button key={s} onClick={()=>setSpicy(s)} className={`px-3 py-2 rounded-lg text-[10px] font-bold border whitespace-nowrap ${spicy===s?'bg-red-500 text-white':'border-orange-400'}`}>{s}</button>)}
                                </div>}
                            </div>
                        )}
                        {MENU[tab].map(item => (
                            <div key={item.name} className="bg-white p-5 rounded-3xl shadow-sm border border-gray-100">
                                <div className="flex justify-between items-center mb-3">
                                    <h3 className="text-2xl font-black">{item.name}</h3>
                                    {type === '外帶' && (tab==='涼麵'||tab==='熱食') && !item.fixed && (
                                        <div className="flex gap-1">
                                            {['微','小','中','大'].map(s => <button key={s} onClick={()=>setItemSpicy({...itemSpicy, [item.name]:s+'辣'})} className={`w-8 h-8 rounded-full border text-[10px] font-bold ${(itemSpicy[item.name]||'不辣')===s+'辣'?'bg-red-600 text-white':'text-gray-300'}`}>{s}</button>)}
                                        </div>
                                    )}
                                </div>
                                <div className="space-y-2">
                                    {(item.pS ? ['小','大'] : item.base ? ['單點','加蛋','加貢丸','綜合'] : ['']).map(lbl => {
                                        if (lbl==='綜合' && (item.name==='蛋花'||item.name==='貢丸')) return null;
                                        const k = `${item.name}-${lbl}-${(lbl==='加蛋'||lbl==='加貢丸'||lbl==='綜合')?lbl:''}`;
                                        const p = lbl==='大'?item.pL:lbl==='小'?item.pS:lbl==='加蛋'?40:lbl==='加貢丸'?45:lbl==='綜合'?60:(item.price||item.base);
                                        return (
                                            <div key={lbl} className="bg-gray-50 p-3 rounded-2xl flex items-center justify-between">
                                                <span className="font-black">{lbl} <span className="text-red-600">${p}</span></span>
                                                <div className="flex items-center gap-3">
                                                    <div className="flex items-center bg-white rounded-full border px-2">
                                                        <button onClick={()=>setCounts({...counts, [k]: Math.max(1, (counts[k]||1)-1)})} className="w-8 h-8 text-xl font-bold text-orange-500">-</button>
                                                        <span className="w-6 text-center font-bold">{counts[k] || 1}</span>
                                                        <button onClick={()=>setCounts({...counts, [k]: (counts[k]||1)+1})} className="w-8 h-8 text-xl font-bold text-orange-500">+</button>
                                                    </div>
                                                    <button onClick={()=>addToCart(item, lbl, (lbl==='加蛋'||lbl==='加貢丸'||lbl==='綜合')?lbl:'')} className="bg-orange-500 text-white px-5 py-2 rounded-xl font-bold">加入</button>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        ))}
                    </main>
                    {cart.length > 0 && page !== 'done' && (
                        <div className="fixed bottom-6 left-6 right-6 no-print z-50">
                            <button onClick={()=>setPage('cart')} className="w-full bg-red-700 text-white p-5 rounded-full shadow-2xl flex justify-between items-center px-8">
                                <span className="text-xl font-black">查看清單 (${cart.reduce((s,i)=>s+(i.p*i.num), 0)})</span>
                                <span className="bg-white text-red-700 w-8 h-8 rounded-full flex items-center justify-center font-black">{cart.length}</span>
                            </button>
                        </div>
                    )}
                    {page === 'cart' && (
                        <div className="fixed inset-0 bg-black/80 z-[100] flex items-end no-print">
                            <div className="bg-white w-full max-h-[80vh] rounded-t-[2.5rem] p-6 overflow-y-auto">
                                <div className="flex justify-between items-center mb-6"><h2 className="text-2xl font-black">購物車</h2><button onClick={()=>setPage('menu')} className="text-4xl text-gray-300">&times;</button></div>
                                {cart.map(i => (
                                    <div key={i.id} className="flex justify-between items-center border-b py-3">
                                        <div><div className="font-black">{i.title} x {i.num}</div><div className="text-[10px] text-gray-400">{i.note}</div></div>
                                        <div className="flex items-center gap-3"><span className="font-black text-red-600">${i.p*i.num}</span><button onClick={()=>setCart(cart.filter(c=>c.id!==i.id))}>🗑️</button></div>
                                    </div>
                                ))}
                                <button onClick={sendOrder} disabled={loading} className="w-full py-5 rounded-2xl text-xl font-black text-white bg-orange-600 mt-6">{loading ? '送出中...' : '送出訂單'}</button>
                            </div>
                        </div>
                    )}
                    {page === 'done' && result && (
                        <div className="min-h-screen bg-white p-6 flex flex-col items-center">
                            <div className="no-print text-center mb-8">
                                <div className="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center text-4xl mx-auto mb-4">✓</div>
                                <h2 className="text-3xl font-black text-gray-800">下單成功</h2>
                                <button onClick={()=>window.print()} className="mt-4 bg-orange-500 text-white px-10 py-3 rounded-xl font-black">列印單據</button>
                            </div>
                            <div className="p-6 border-2 border-dashed border-gray-400 w-full max-w-sm bg-white font-mono">
                                <h3 className="text-2xl font-black text-center mb-2">永吉涼麵</h3>
                                <div className="text-center text-xs border-b pb-2 mb-4">
                                    {result.time}<br/>
                                    流水號：<span className="text-3xl font-black">{result.orderId}</span><br/>
                                    (隨機編號，與順序無關)
                                </div>
                                <div className="flex justify-between font-bold mb-4"><span>{result.type}</span><span>{result.table ? result.table+'桌' : ''}</span><span>{result.people}人</span></div>
                                <div className="border-b pb-4 mb-4 space-y-2 text-sm">
                                    {result.cart.map(i => <div key={i.id} className="flex justify-between"><span>{i.title} x {i.num}<br/><span className="text-[10px] text-gray-400">{i.note}</span></span><span>${i.p*i.num}</span></div>)}
                                </div>
                                <div className="text-right text-2xl font-black">總計：${result.total}</div>
                            </div>
                            <button onClick={()=>location.reload()} className="mt-8 text-gray-400 underline no-print">回首頁</button>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
