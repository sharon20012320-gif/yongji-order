<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>永記小吃部 - 線上點餐</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
        .active-tab { border-bottom: 3px solid #ef4444; color: #ef4444; font-weight: bold; }
        .loading-spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #ef4444;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        const { useState, useEffect } = React;

        const menuData = {
            "熱門推薦": [
                { id: 1, title: "招牌乾麵", price: 50, note: "附清湯" },
                { id: 2, title: "滷肉飯 (大)", price: 45, note: "肥瘦適中" }
            ],
            "麵食類": [
                { id: 3, title: "麻醬麵", price: 55 },
                { id: 4, title: "陽春麵", price: 45 },
                { id: 5, title: "餛飩麵", price: 65 }
            ],
            "湯品/小菜": [
                { id: 6, title: "貢丸湯", price: 30 },
                { id: 7, title: "燙青菜", price: 40 },
                { id: 8, title: "滷蛋", price: 15 }
            ]
        };

        const App = () => {
            const [view, setView] = useState('menu'); // menu, cart, finish
            const [orderType, setOrderType] = useState('內用');
            const [table, setTable] = useState('');
            const [people, setPeople] = useState('1');
            const [activeTab, setActiveTab] = useState("熱門推薦");
            const [cart, setCart] = useState([]);
            const [isSending, setIsSending] = useState(false);
            const [finishData, setFinishData] = useState(null);

            const addToCart = (item, spicy) => {
                const note = spicy ? `(${spicy})` : "(不辣)";
                setCart([...cart, { ...item, qty: 1, unitP: item.price, note }]);
            };

            const removeFromCart = (index) => {
                const newCart = [...cart];
                newCart.splice(index, 1);
                setCart(newCart);
            };

            const totalAmount = cart.reduce((sum, item) => sum + (item.unitP * item.qty), 0);

            const submitOrder = async () => {
                if (orderType === '內用' && !table) {
                    alert("請輸入桌號");
                    return;
                }

                // --- 🍴 外帶餐具詢問功能 ---
                let utensilsChoice = "內用不需要";
                if (orderType === '外帶') {
                    const wantsUtensils = window.confirm("【外帶確認】請問您需要餐具嗎？\n(按「確定」為需要，按「取消」為不需要)");
                    utensilsChoice = wantsUtensils ? "需要餐具" : "不需要餐具";
                }
                // --------------------------

                setIsSending(true);
                const orderId = "#" + (Math.floor(Math.random() * 899) + 100);
                const timeStr = new Date().toLocaleString('zh-TW', { hour12: false });
                
                // 整理品項摘要
                const summaryMap = {};
                cart.forEach(item => {
                    if (!summaryMap[item.title]) summaryMap[item.title] = { total: 0, spicies: {} };
                    summaryMap[item.title].total += item.qty;
                    const noteClean = item.note.replace(/[()]/g, '');
                    summaryMap[item.title].spicies[noteClean] = (summaryMap[item.title].spicies[noteClean] || 0) + item.qty;
                });

                const displayLines = Object.keys(summaryMap).map(title => {
                    const data = summaryMap[title];
                    const spicyDetails = Object.entries(data.spicies).map(([l, c]) => `${l}*${c}`).join('、');
                    return `${title} x ${data.total} (${spicyDetails})`;
                });

                const final = {
                    key: "yongji888",
                    orderType, 
                    tableNum: table || "外帶", 
                    people,
                    utensils: utensilsChoice, // ✅ 加入餐具欄位
                    items: displayLines.join(', '),
                    totalPrice: totalAmount,
                    orderId
                };

                setFinishData({ ...final, finishTime: timeStr, displayLines });

                try {
                    // 發送到 Google Sheets (需確保腳本有接收 utensils 欄位)
                    await fetch('https://script.google.com/macros/s/AKfycby4QS3nhpwUZYMFJBY5REXflTuzat3IPX6m2qKkOurpijIS1gQWpsxG3lFk9CUtQM62/exec', { 
                        method: 'POST', 
                        mode: 'no-cors', 
                        body: JSON.stringify(final) 
                    });
                } catch(e) { console.error("發送失敗", e); }

                setView('finish');
                setIsSending(false);
                setCart([]);
            };

            if (view === 'finish') {
                return (
                    <div className="min-h-screen bg-white p-6 flex flex-col items-center justify-center text-center">
                        <div className="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mb-4">
                            <svg className="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"></path></svg>
                        </div>
                        <h2 className="text-2xl font-bold text-gray-800 mb-2">訂單已送達廚房</h2>
                        <p className="text-gray-500 mb-6">您的編號：<span className="text-red-600 font-bold text-xl">{finishData.orderId}</span></p>
                        
                        <div className="w-full max-w-sm bg-gray-50 rounded-lg p-4 text-left mb-6 text-sm">
                            <p><strong>時間：</strong> {finishData.finishTime}</p>
                            <p><strong>類型：</strong> {finishData.orderType} {finishData.orderType === '內用' ? `(${finishData.tableNum}桌)` : ''}</p>
                            <p><strong>餐具：</strong> {finishData.utensils}</p>
                            <hr className="my-2"/>
                            {finishData.displayLines.map((line, i) => <p key={i}>{line}</p>)}
                            <p className="mt-2 text-right font-bold text-lg text-red-600">總計：${finishData.totalPrice}</p>
                        </div>

                        <button onClick={() => setView('menu')} className="w-full max-w-sm bg-red-500 text-white py-3 rounded-xl font-bold">返回首頁</button>
                    </div>
                );
            }

            return (
                <div className="max-w-md mx-auto min-h-screen pb-24">
                    {/* Header */}
                    <header className="bg-white p-4 sticky top-0 z-10 shadow-sm">
                        <h1 className="text-xl font-bold text-gray-800">永記小吃部</h1>
                        <div className="flex gap-4 mt-3">
                            <button onClick={() => setOrderType('內用')} className={`px-4 py-1 rounded-full text-sm ${orderType === '內用' ? 'bg-red-500 text-white' : 'bg-gray-100 text-gray-600'}`}>內用</button>
                            <button onClick={() => setOrderType('外帶')} className={`px-4 py-1 rounded-full text-sm ${orderType === '外帶' ? 'bg-red-500 text-white' : 'bg-gray-100 text-gray-600'}`}>外帶</button>
                        </div>
                        {orderType === '內用' && (
                            <div className="flex gap-2 mt-3">
                                <input type="number" placeholder="桌號" className="w-1/2 border p-2 rounded-lg text-sm" value={table} onChange={e => setTable(e.target.value)} />
                                <select className="w-1/2 border p-2 rounded-lg text-sm" value={people} onChange={e => setPeople(e.target.value)}>
                                    {[1,2,3,4,5,6].map(n => <option key={n} value={n}>{n} 人</option>)}
                                </select>
                            </div>
                        )}
                    </header>

                    {/* Tabs */}
                    <div className="flex overflow-x-auto bg-white border-b sticky top-[116px] z-10">
                        {Object.keys(menuData).map(tab => (
                            <button key={tab} onClick={() => setActiveTab(tab)} className={`px-6 py-3 whitespace-nowrap text-sm ${activeTab === tab ? 'active-tab' : 'text-gray-500'}`}>{tab}</button>
                        ))}
                    </div>

                    {/* Menu Items */}
                    <div className="p-4 space-y-4">
                        {menuData[activeTab].map(item => (
                            <div key={item.id} className="bg-white p-4 rounded-xl shadow-sm flex justify-between items-center">
                                <div>
                                    <h3 className="font-bold text-gray-800">{item.title}</h3>
                                    <p className="text-red-500 font-bold mt-1">${item.price}</p>
                                    {item.note && <p className="text-xs text-gray-400 mt-1">{item.note}</p>}
                                </div>
                                <div className="flex flex-col gap-2">
                                    <button onClick={() => addToCart(item, "不辣")} className="bg-gray-100 text-gray-700 px-3 py-1 rounded-lg text-xs font-bold">+ 不辣</button>
                                    <button onClick={() => addToCart(item, "加辣")} className="bg-red-50 text-red-600 px-3 py-1 rounded-lg text-xs font-bold">+ 加辣</button>
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* Footer / Cart Bar */}
                    {cart.length > 0 && view === 'menu' && (
                        <div className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white border-t p-4 flex justify-between items-center shadow-lg">
                            <div onClick={() => setView('cart')} className="cursor-pointer">
                                <span className="bg-red-500 text-white px-2 py-1 rounded-full text-xs mr-2">{cart.length}</span>
                                <span className="font-bold text-gray-700">總計 ${totalAmount}</span>
                            </div>
                            <button onClick={() => setView('cart')} className="bg-red-500 text-white px-8 py-2 rounded-xl font-bold">查看購物車</button>
                        </div>
                    )}

                    {/* Cart View Overlay */}
                    {view === 'cart' && (
                        <div className="fixed inset-0 z-50 bg-gray-900 bg-opacity-50 flex flex-col justify-end">
                            <div className="bg-white rounded-t-3xl max-h-[80vh] overflow-y-auto p-6">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-xl font-bold">確認訂單</h2>
                                    <button onClick={() => setView('menu')} className="text-gray-400 text-2xl">&times;</button>
                                </div>
                                <div className="space-y-4 mb-6">
                                    {cart.map((item, idx) => (
                                        <div key={idx} className="flex justify-between items-center border-b pb-3">
                                            <div>
                                                <p className="font-medium">{item.title} <span className="text-gray-400 text-sm">{item.note}</span></p>
                                                <p className="text-red-500 font-bold">${item.unitP}</p>
                                            </div>
                                            <button onClick={() => removeFromCart(idx)} className="text-gray-300 border px-2 py-1 rounded">刪除</button>
                                        </div>
                                    ))}
                                </div>
                                <div className="flex justify-between items-center mb-6">
                                    <span className="text-gray-500">總金額</span>
                                    <span className="text-2xl font-bold text-red-600">${totalAmount}</span>
                                </div>
                                <button 
                                    onClick={submitOrder} 
                                    disabled={isSending}
                                    className={`w-full py-4 rounded-2xl font-bold text-white flex items-center justify-center ${isSending ? 'bg-gray-400' : 'bg-red-500'}`}
                                >
                                    {isSending ? <div className="loading-spinner"></div> : "確認送出訂單"}
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
