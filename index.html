<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>永吉涼麵 - 點餐系統</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #FDFBF7; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        .tab-active { border-bottom: 4px solid #E67E22; color: #E67E22; font-weight: 900; }
        .spicy-btn-active { background-color: #C0392B !important; color: white !important; border-color: #C0392B !important; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const MENU = {
            "涼麵": [
                { name: "原味涼麵", pS: 50, pL: 60 }, { name: "芥末涼麵", pS: 50, pL: 60 },
                { name: "素食涼麵", pS: 50, pL: 60 }, { name: "雞絲涼麵", pS: 60, pL: 70 },
                { name: "三絲涼麵", pS: 60, pL: 70, note: "火腿、蛋絲、小黃瓜"}, { name: "炸醬涼麵", pS: 60, pL: 70 },
                { name: "泰式涼麵", pS: 65, pL: 75, fixed: "大辣", note: "辣度固定大辣" }
            ],
            "熱食": [
                { name: "炒麵", pS: 50, pL: 60 }, { name: "魯肉飯", pS: 45, pL: 55 },
                { name: "雞肉飯", pS: 45, pL: 55 }, { name: "味噌蛋麵", price: 65 }, { name: "炸醬麵", price: 60 }
            ],
            "湯類": [
                { name: "味噌", base: 25 }, { name: "紫菜", base: 25 },
                { name: "蘿蔔", base: 30 }, { name: "蛋花", base: 30 }, { name: "貢丸", base: 40 }
            ],
            "小菜": [
                { name: "魯蛋", price: 15 }, { name: "海帶", price: 10 }, { name: "小豆干", price: 10 },
                { name: "大豆干", price: 20 }, { name: "素雞", price: 15 }, { name: "蘿蔔", price: 15 },
                { name: "百頁", price: 20 }, { name: "麵腸", price: 20 }, { name: "素肚", price: 30 }, { name: "杏鮑菇", price: 30 }
            ]
        };

        const App = () => {
            const [view, setView] = useState('start');
            const [isResting, setIsResting] = useState(false);
            const [orderType, setOrderType] = useState('');
            const [table, setTable] = useState('');
            const [people, setPeople] = useState(1);
            const [tab, setTab] = useState('涼麵');
            const [cart, setCart] = useState([]);
            const [gSauce, setGSauce] = useState('蒜蓉醬油');
            const [gOnion, setGOnion] = useState('加蔥');
            const [gSpicy, setGSpicy] = useState('不辣');
            const [spicyPrefs, setSpicyPrefs] = useState({});
            const [counts, setCounts] = useState({});
            const [isSending, setIsSending] = useState(false);
            const [finishData, setFinishData] = useState(null);
            const [needUtensils, setNeedUtensils] = useState(false);

            useEffect(() => {
                const checkTime = () => {
                    const now = new Date();
                    const hour = now.getHours();
                    if (hour < 7 || hour >= 17) setIsResting(true);
                    else setIsResting(false);
                };
                checkTime();
                const timer = setInterval(checkTime, 60000);
                return () => clearInterval(timer);
            }, []);

            const handleAdd = (item, label = '', extra = '') => {
                const cKey = `${item.name}-${label}-${extra}`;
                const qty = counts[cKey] || 1;
                let unitP = item.price || item.base || (label === '大' ? item.pL : item.pS);
                if (extra === '加蛋') unitP = 40;
                if (extra === '加貢丸') unitP = 45;
                if (extra === '綜合') unitP = 60;

                const currentSpicy = item.fixed || (spicyPrefs[item.name] ? (spicyPrefs[item.name].length === 1 ? spicyPrefs[item.name] + '辣' : spicyPrefs[item.name]) : '不辣');
                const note = tab === '小菜'
                    ? `(${gSauce}, ${gOnion}${orderType === '外帶' ? ', ' + gSpicy : ''})`
                    : `(${orderType === '外帶' ? currentSpicy : '內用'})`;

                const title = `${item.name}${label}${extra}`;
                setCart([...cart, { id: Date.now() + Math.random(), title, unitP, qty, note }]);
                setCounts({...counts, [cKey]: 1});
            };

            const updateCartQty = (id, delta) => {
                setCart(prev => prev.map(item => {
                    if (item.id === id) {
                        const newQty = Math.max(1, item.qty + delta);
                        return { ...item, qty: newQty };
                    }
                    return item;
                }));
            };

            const submitOrder = async () => {
                setIsSending(true);
                const orderId = "#" + (Math.floor(Math.random() * 899) + 100);
                const timeStr = new Date().toLocaleString('zh-TW', { hour12: true });

                const summaryMap = {};
                cart.forEach(item => {
                    if (!summaryMap[item.title]) summaryMap[item.title] = { total: 0, spicies: {} };
                    summaryMap[item.title].total += item.qty;
                    const noteClean = item.note.replace(/[()]/g, '');
                    summaryMap[item.title].spicies[noteClean] = (summaryMap[item.title].spicies[noteClean] || 0) + item.qty;
                });

                const displayLines = Object.keys(summaryMap).map(title => {
                    const data = summaryMap[title];
                    const spicyDetails = Object.entries(data.spicies).map(([l, c]) => `${l}*${c}`).join('、');
                    return `${title} x ${data.total} (${spicyDetails})`;
                });

                const utensilNote = orderType === '外帶' ? (needUtensils ? "【需要餐具】" : "【不需餐具】") : "";
                const itemsString = displayLines.join(', ') + (orderType === '外帶' ? (needUtensils ? " | 【需要餐具】" : " | 【不需餐具】") : "");
                const totalP = cart.reduce((s, i) => s + (i.unitP * i.qty), 0);

                setFinishData({ orderId, finishTime: timeStr, displayLines, utensilNote, totalPrice: totalP });

                const scriptUrl = 'https://script.google.com/macros/s/AKfycbzVKMi92fGpu9M3kIFqr4_iwliInZ8X3IjTFEWzJirOhZGX8c7KuncsxFyU0o0d1NI1/exec';

                try {
                    await fetch(scriptUrl, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'text/plain' },
                        body: JSON.stringify({
                            key: "yongji888",
                            orderType: orderType,
                            tableNum: table,
                            people: orderType === '內用' ? Number(people) : 0,
                            items: itemsString,
                            totalPrice: totalP,
                            orderId: orderId
                        })
                    });
                } catch(e) { console.error(e); }

                setView('finish');
                setIsSending(false);
            };

            if (isResting) return (
                <div className="flex flex-col items-center justify-center min-h-screen p-6 bg-[#FDFBF7] text-center">
                    <div className="w-44 h-44 bg-gray-400 rounded-full flex items-center justify-center text-white text-4xl font-black mb-8 shadow-2xl">永吉<br/>涼麵</div>
                    <h2 className="text-4xl font-black text-gray-700 mb-4">休息中</h2>
                    <div className="bg-white p-6 rounded-3xl shadow-lg border-2 border-orange-200">
                        <p className="text-xl font-bold text-orange-600 mb-2">營業時間：二~日</p>
                        <p className="text-3xl font-black text-gray-800">07:00 ~ 15:00</p>
                    </div>
                </div>
            );

            if (view === 'start') return (
                <div className="flex flex-col items-center justify-center min-h-screen p-6 bg-[#FDFBF7]">
                    <div className="w-44 h-44 bg-red-700 rounded-full flex items-center justify-center text-white text-4xl font-black mb-16 shadow-2xl text-center">永吉<br/>涼麵</div>
                    <div className="w-full max-w-xs space-y-6">
                        <button onClick={()=>{setOrderType('內用'); setView('setup');}} className="w-full py-12 bg-white border-4 border-orange-500 text-orange-600 rounded-[2rem] text-5xl font-black shadow-lg">內用</button>
                        <button onClick={()=>{setOrderType('外帶'); setView('menu'); setTable('');}} className="w-full py-12 bg-orange-500 text-white rounded-[2rem] text-5xl font-black shadow-lg">外帶</button>
                    </div>
                </div>
            );

            if (view === 'setup') return (
                <div className="flex flex-col items-center justify-center min-h-screen p-6">
                    <div className="bg-white p-8 rounded-[2.5rem] shadow-xl w-full max-w-md border border-orange-100">
                        <h2 className="text-3xl font-black mb-8 text-center text-orange-800">用餐資訊</h2>

                        <label className="block mb-2 font-bold text-lg text-center">用餐人數：</label>
                        <div className="flex justify-center items-center mb-10">
                            <button
                                className="bg-gray-200 px-6 py-3 rounded-l-lg text-3xl font-bold"
                                onClick={() => setPeople(prev => Math.max(1, Number(prev) - 1))}
                            >-</button>
                            <span className="px-10 py-3 text-3xl font-bold border-t border-b w-24 text-center">{people}</span>
                            <button
                                className="bg-gray-200 px-6 py-3 rounded-r-lg text-3xl font-bold"
                                onClick={() => setPeople(prev => Math.min(10, Number(prev) + 1))}
                            >+</button>
                        </div>

                        <label className="block mb-4 font-bold text-lg text-center">選擇桌號：</label>
                        <div className="grid grid-cols-4 gap-3">
                            {[1,2,3,5,6,7,8,9,10,11].map(n => (
                                <button key={n}
                                    onClick={() => { setTable(n.toString()); setView('menu'); }}
                                    className="py-4 bg-white border-2 border-orange-400 text-orange-600 rounded-xl text-2xl font-black active:bg-orange-500 active:text-white"
                                >
                                    {n}
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            );

            if (view === 'finish') return (
                <div className="flex flex-col items-center justify-center min-h-screen p-6">
                    <div className="bg-white p-10 rounded-[3rem] shadow-2xl text-center w-full max-w-sm border-t-8 border-orange-500">
                        <div className="text-7xl mb-6">✅</div>
                        <h2 className="text-4xl font-black text-gray-800 mb-2">訂單已送出</h2>
                        <p className="text-orange-600 font-bold text-3xl mb-1">單號：{finishData?.orderId}</p>
                        <p className="text-gray-400 font-bold text-sm mb-4">此號為流水號，與順序無關</p>
                        {finishData?.utensilNote && (
                            <p className="text-red-600 font-black text-xl mb-4 underline decoration-2">{finishData.utensilNote}</p>
                        )}
                        <p className="text-gray-400 text-xs mb-6 italic">送出時間：{finishData?.finishTime}</p>
                        <div className="text-left bg-orange-50 p-6 rounded-2xl mb-8 space-y-2">
                            {finishData?.displayLines.map((line, idx) => (
                                <div key={idx} className="text-gray-600 font-bold">● {line}</div>
                            ))}
                            <div className="border-t border-orange-200 mt-4 pt-2 text-2xl font-black text-red-600 text-right">總計：${finishData?.totalPrice}</div>
                        </div>
                        <p className="text-2xl font-bold text-gray-500 mb-6 italic underline decoration-orange-200 underline-offset-8">謝謝您的惠顧</p>
                        <div className="bg-red-600 text-white py-6 px-4 rounded-2xl shadow-lg">
                            <p className="text-2xl font-black mb-1">請至櫃檯結帳</p>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="max-w-4xl mx-auto pb-44">
                    <header className="bg-white p-4 sticky top-0 z-50 shadow-md flex justify-between items-center no-print text-red-700">
                        <h1 className="text-3xl font-black italic">永吉涼麵</h1>
                        <span className="bg-orange-600 text-white px-4 py-1 rounded-full font-bold text-sm">{orderType} {table && `${table}桌`}</span>
                    </header>
                    <nav className="flex bg-white sticky top-[72px] z-40 border-b no-print shadow-sm overflow-x-auto">
                        {Object.keys(MENU).map(k => (
                            <button key={k} onClick={()=>setTab(k)} className={`flex-1 py-5 text-2xl min-w-[100px] ${tab === k ? 'tab-active' : 'text-gray-400 font-bold'}`}>{k}</button>
                        ))}
                    </nav>
                    <main className="p-4 space-y-6 no-print">
                        {tab === '小菜' && (
                            <div className="bg-orange-600 p-6 rounded-[2rem] text-white shadow-xl space-y-4 border-4 border-orange-400">
                                <h3 className="font-black text-xl text-center">🥗 小菜口味調整</h3>
                                <div className="grid grid-cols-3 gap-2">
                                    {['蒜蓉醬油','素醬油','不加醬'].map(s => <button key={s} onClick={()=>setGSauce(s)} className={`py-3 rounded-xl text-sm font-bold border-2 ${gSauce===s?'bg-white text-orange-600 border-white':'border-orange-400'}`}>{s}</button>)}
                                </div>
                                <div className="grid grid-cols-2 gap-2">
                                    {['加蔥','不加蔥'].map(o => <button key={o} onClick={()=>setGOnion(o)} className={`py-3 rounded-xl text-sm font-bold border-2 ${gOnion===o?'bg-white text-orange-600 border-white':'border-orange-400'}`}>{o}</button>)}
                                </div>
                                {orderType === '外帶' && (
                                    <div className="flex gap-2 overflow-x-auto pb-2">
                                        {['不辣','微辣','小辣','中辣','大辣'].map(s => <button key={s} onClick={()=>setGSpicy(s)} className={`px-4 py-3 rounded-xl text-xs font-bold border-2 whitespace-nowrap ${gSpicy===s?'bg-red-500 text-white border-white':'border-orange-400'}`}>{s}</button>)}
                                    </div>
                                )}
                            </div>
                        )}
                        {MENU[tab].map(item => (
                            <div key={item.name} className="bg-white p-6 rounded-[2rem] shadow-md border border-orange-50">
                                <div className="flex flex-col mb-4">
                                    <h3 className="text-3xl font-black text-gray-800 mb-2">{item.name}</h3>
                                    {orderType === '外帶' && (tab==='涼麵'||tab==='熱食') && !item.fixed && (
                                        <div className="flex gap-1 flex-wrap">
                                            {['不辣','微辣','小辣','中辣','大辣'].map(s => (
                                                <button key={s} onClick={()=>setSpicyPrefs({...spicyPrefs, [item.name]: s})} className={`px-3 py-2 rounded-xl border-2 font-bold text-xs transition-all ${(spicyPrefs[item.name]||'不辣')===s?'spicy-btn-active':'text-gray-600 border-gray-200 font-black'}`}>{s}</button>
                                            ))}
                                        </div>
                                    )}
                                </div>
                                <div className="space-y-3">
                                    {(item.pS ? ['小','大'] : item.base ? ['單點','加蛋','加貢丸','綜合'] : ['']).map(lbl => {
                                        if (lbl==='綜合' && (item.name==='蛋花'||item.name==='貢丸')) return null;
                                        const key = `${item.name}-${lbl}-${(lbl==='加蛋'||lbl==='加貢丸'||lbl==='綜合')?lbl:''}`;
                                        const p = lbl==='大'?item.pL:lbl==='小'?item.pS:lbl==='加蛋'?40:lbl==='加貢丸'?45:lbl==='綜合'?60:(item.price||item.base);
                                        return (
                                            <div key={lbl} className="bg-gray-50 p-4 rounded-3xl flex items-center justify-between shadow-inner">
                                                <span className="text-xl font-black">{lbl} <span className="text-red-600 ml-1">${p}</span></span>
                                                <div className="flex items-center gap-4">
                                                    <div className="flex items-center bg-white rounded-full border-2 border-orange-200 px-3">
                                                        <button onClick={()=>setCounts({...counts, [key]: Math.max(1, (counts[key]||1)-1)})} className="w-10 h-10 text-3xl font-black text-orange-500">-</button>
                                                        <span className="w-8 text-center text-xl font-black">{counts[key] || 1}</span>
                                                        <button onClick={()=>setCounts({...counts, [key]: (counts[key]||1)+1})} className="w-10 h-10 text-3xl font-black text-orange-500">+</button>
                                                    </div>
                                                    <button onClick={()=>handleAdd(item, lbl, (lbl==='加蛋'||lbl==='加貢丸'||lbl==='綜合')?lbl:'')} className="bg-orange-500 text-white px-8 py-3 rounded-2xl font-black active:scale-90 transition-transform">加入</button>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        ))}
                    </main>
                    {cart.length > 0 && view !== 'finish' && (
                        <div className="fixed bottom-8 left-6 right-6 no-print z-50">
                            <button onClick={()=>setView('cart')} className="w-full bg-red-700 text-white p-6 rounded-[2.5rem] shadow-2xl flex justify-between items-center px-10 active:scale-95 transition-transform border-4 border-red-800">
                                <span className="text-3xl font-black">結帳清單 (${cart.reduce((s,i)=>s+(i.unitP*i.qty), 0)})</span>
                                <span className="bg-white text-red-700 w-12 h-12 rounded-full flex items-center justify-center font-black text-xl shadow-inner">{cart.reduce((s,i)=>s+i.qty, 0)}</span>
                            </button>
                        </div>
                    )}
                    {view === 'cart' && (
                        <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-[100] flex items-end no-print">
                            <div className="bg-white w-full max-h-[90vh] rounded-t-[3.5rem] p-8 overflow-y-auto shadow-2xl">
                                <div className="flex justify-between items-center mb-8 border-b pb-4">
                                    <h2 className="text-3xl font-black text-gray-800">核對餐點</h2>
                                    <button onClick={()=>setView('menu')} className="text-6xl text-gray-300">&times;</button>
                                </div>
                                {orderType === '外帶' && (
                                    <div className="mb-8 p-6 bg-orange-50 rounded-3xl border-2 border-orange-200">
                                        <p className="text-center font-black text-orange-800 mb-4 text-3xl">需要外帶餐具嗎？</p>
                                        <div className="grid grid-cols-2 gap-4">
                                            <button
                                                onClick={() => setNeedUtensils(false)}
                                                className={`py-5 rounded-2xl font-black text-2xl border-4 transition-all ${!needUtensils ? 'bg-green-600 text-white border-green-700 shadow-inner' : 'bg-white text-green-600 border-gray-100'}`}
                                            >♻️ 不需要</button>
                                            <button
                                                onClick={() => setNeedUtensils(true)}
                                                className={`py-5 rounded-2xl font-black text-2xl border-4 transition-all ${needUtensils ? 'bg-orange-500 text-white border-orange-600 shadow-inner' : 'bg-white text-orange-500 border-gray-100'}`}
                                            >🥢 需要</button>
                                        </div>
                                    </div>
                                )}
                                <div className="space-y-4 mb-10">
                                    {cart.map(i => (
                                        <div key={i.id} className="bg-gray-50 p-5 rounded-3xl border border-gray-100 shadow-sm flex justify-between items-center">
                                            <div className="flex-1">
                                                <div className="text-xl font-black text-gray-700">{i.title}</div>
                                                <div className="text-sm text-gray-400 font-bold">{i.note}</div>
                                                <span className="text-2xl font-black text-red-600">${i.unitP * i.qty}</span>
                                            </div>
                                            <div className="flex items-center gap-4">
                                                <div className="flex items-center bg-white rounded-full border-2 border-orange-200 px-2">
                                                    <button onClick={()=>updateCartQty(i.id, -1)} className="w-8 h-8 text-2xl font-black text-orange-500">-</button>
                                                    <span className="w-8 text-center font-black">{i.qty}</span>
                                                    <button onClick={()=>updateCartQty(i.id, 1)} className="w-8 h-8 text-2xl font-black text-orange-500">+</button>
                                                </div>
                                                <button onClick={()=>setCart(cart.filter(c=>c.id!==i.id))} className="text-3xl">❌️</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <button onClick={submitOrder} disabled={isSending} className="w-full py-8 rounded-[2rem] text-4xl font-black text-white bg-orange-600 shadow-xl active:scale-95 transition-transform border-b-8 border-orange-800">
                                    {isSending ? '訂單送出中...' : '確認送出'}
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
