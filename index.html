<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>永吉涼麵 - 專業點餐系統</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; background-color: #FDFBF7; color: #4A3728; }
        .tab-active { border-bottom: 5px solid #E67E22; color: #E67E22; font-weight: 900; }
        .huge-text { font-size: 4rem; line-height: 1; font-weight: 900; }
        .price-big { font-size: 1.5rem; font-weight: 900; color: #C0392B; }
        .spicy-active { background-color: #C0392B !important; color: white !important; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        // 請在此處貼上您從 Google Apps Script 部署得到的 URL
        const scriptURL = '請貼上您的網頁應用程式URL';

        const MENU_DATA = {
            "涼麵": [
                { name: "原味", pS: 50, pL: 60 }, { name: "芥末", pS: 50, pL: 60 },
                { name: "素食", pS: 50, pL: 60 }, { name: "雞絲", pS: 60, pL: 70 },
                { name: "三絲", pS: 60, pL: 70 }, { name: "炸醬", pS: 60, pL: 70 },
                { name: "泰式", pS: 65, pL: 75, fixedSpicy: "大辣" }
            ],
            "熱食": [
                { name: "炒麵", pS: 50, pL: 60 }, { name: "魯肉飯", pS: 45, pL: 55 },
                { name: "雞肉飯", pS: 45, pL: 55 }, { name: "味噌蛋麵", price: 65 }, { name: "炸醬麵", price: 60 }
            ],
            "湯類": [
                { name: "味噌", base: 25 }, { name: "紫菜", base: 25 },
                { name: "蘿蔔", base: 30 }, { name: "蛋花", base: 30 }, { name: "貢丸", base: 40 }
            ],
            "小菜": [
                { name: "魯蛋", price: 15 }, { name: "海帶", price: 10 }, { name: "小豆干", price: 10 },
                { name: "大豆干", price: 20 }, { name: "素雞", price: 15 }, { name: "蘿蔔", price: 15 },
                { name: "百頁", price: 20 }, { name: "麵腸", price: 20 }, { name: "素肚", price: 30 }, { name: "杏鮑菇", price: 30 }
            ]
        };

        const App = () => {
            const [view, setView] = useState('welcome');
            const [orderType, setOrderType] = useState('');
            const [tableNum, setTableNum] = useState('');
            const [cart, setCart] = useState([]);
            const [activeTab, setActiveTab] = useState('涼麵');
            const [tempSpicy, setTempSpicy] = useState({});
            const [isSubmitting, setIsSubmitting] = useState(false);

            const addToCart = (item, sizeLabel = '', extra = '') => {
                let unitPrice = item.price || item.base || (sizeLabel === '大' ? item.pL : item.pS);
                if (extra === '加蛋') unitPrice = 40;
                if (extra === '加貢丸') unitPrice = 45;
                if (extra === '綜合') unitPrice = 60;
                
                setCart([...cart, {
                    cartId: Date.now() + Math.random(),
                    displayName: `${item.name}${sizeLabel}${extra}`,
                    unitPrice, count: 1,
                    spice: orderType === '外帶' ? (item.fixedSpicy || tempSpicy[item.name] || '不辣') : '內用'
                }]);
            };

            const submitOrder = async () => {
                setIsSubmitting(true);
                const orderData = {
                    orderType: orderType,
                    tableNum: tableNum,
                    items: cart.map(i => `${i.displayName}(${i.spice}) x ${i.count}`).join(', '),
                    totalPrice: cart.reduce((s,i)=>s+(i.unitPrice*i.count), 0),
                    orderId: "#" + (Math.floor(Math.random()*900)+100)
                };

                try {
                    await fetch(scriptURL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify(orderData)
                    });
                } catch (e) {
                    console.error("提交失敗", e);
                }
                
                setView('done');
                setIsSubmitting(false);
            };

            if (view === 'welcome') return (
                <div className="flex flex-col items-center justify-center min-h-screen bg-[#FDFBF7]">
                    <div className="w-40 h-40 bg-red-700 rounded-full flex items-center justify-center text-white text-3xl font-bold mb-12 shadow-xl">永吉<br/>涼麵</div>
                    <div className="w-full max-w-sm space-y-6 px-6 text-center">
                        <button onClick={()=>{setOrderType('內用'); setView('table');}} className="w-full py-10 bg-white border-4 border-orange-500 text-orange-600 rounded-3xl text-4xl font-black shadow-lg">內用</button>
                        <button onClick={()=>{setOrderType('外帶'); setView('menu');}} className="w-full py-10 bg-orange-500 text-white rounded-3xl text-4xl font-black shadow-lg">外帶</button>
                    </div>
                </div>
            );

            if (view === 'table') return (
                <div className="flex flex-col items-center justify-center min-h-screen p-6">
                    <h2 className="text-3xl font-black mb-8">請選擇桌號</h2>
                    <div className="grid grid-cols-4 gap-4 w-full max-w-md">
                        {[1,2,3,5,6,7,8,9,10,11].map(n => (
                            <button key={n} onClick={()=>{setTableNum(n); setView('menu');}} className="py-6 bg-white border-2 border-orange-500 text-orange-600 rounded-2xl text-2xl font-bold">{n}</button>
                        ))}
                    </div>
                </div>
            );

            return (
                <div className="max-w-4xl mx-auto pb-40">
                    <header className="bg-white p-4 sticky top-0 z-50 shadow-md flex justify-between items-center">
                        <span className="text-2xl font-black text-red-700">永吉涼麵</span>
                        <span className="bg-orange-100 px-4 py-1 rounded-full font-bold text-orange-700 text-sm">{orderType} {tableNum && `${tableNum}桌`}</span>
                    </header>
                    <nav className="flex bg-white sticky top-[68px] z-40 border-b overflow-x-auto">
                        {Object.keys(MENU_DATA).map(tab => (
                            <button key={tab} onClick={()=>setActiveTab(tab)} className={`flex-1 min-w-[80px] py-4 text-xl ${activeTab === tab ? 'tab-active' : 'text-gray-400'}`}>{tab}</button>
                        ))}
                    </nav>
                    <main className="p-4 space-y-4">
                        {MENU_DATA[activeTab].map(item => (
                            <div key={item.name} className="bg-white p-6 rounded-[2rem] shadow-sm border border-gray-100">
                                <h3 className="text-3xl font-black">{item.name}</h3>
                                {orderType === '外帶' && (activeTab==='涼麵'||activeTab==='熱食') && !item.fixedSpicy && (
                                    <div className="flex gap-1 mt-3">
                                        {['大辣','中辣','小辣','微辣','不辣'].map(s => (
                                            <button key={s} onClick={()=>setTempSpicy({...tempSpicy, [item.name]:s})} className={`flex-1 py-2 rounded-lg text-xs border ${ (tempSpicy[item.name] || '不辣') === s ? 'spicy-active' : 'bg-white' }`}>{s}</button>
                                        ))}
                                    </div>
                                )}
                                <div className="mt-4">
                                    {item.pS ? (
                                        <div className="flex gap-3">
                                            <button onClick={()=>addToCart(item, '大')} className="flex-1 bg-orange-50 py-6 rounded-2xl text-center"><span className="text-3xl font-black">大</span><br/><span className="price-big">${item.pL}</span></button>
                                            <button onClick={()=>addToCart(item, '小')} className="flex-1 bg-gray-50 py-6 rounded-2xl text-center"><span className="text-3xl font-black">小</span><br/><span className="price-big">${item.pS}</span></button>
                                        </div>
                                    ) : item.base ? (
                                        <div className="grid grid-cols-2 gap-2">
                                            <button onClick={()=>addToCart(item)} className="bg-gray-50 py-4 rounded-xl text-lg font-bold">單點 ${item.base}</button>
                                            <button onClick={()=>addToCart(item,'','加蛋')} className="bg-orange-50 py-4 rounded-xl text-lg font-bold">加蛋 $40</button>
                                            <button onClick={()=>addToCart(item,'','加貢丸')} className="bg-orange-50 py-4 rounded-xl text-lg font-bold">加貢丸 $45</button>
                                            {item.name !== '蛋花' && item.name !== '貢丸' && <button onClick={()=>addToCart(item,'','綜合')} className="bg-orange-100 py-4 rounded-xl text-lg font-bold">綜合 $60</button>}
                                        </div>
                                    ) : (
                                        <button onClick={()=>addToCart(item)} className="w-full bg-orange-600 text-white py-5 rounded-2xl text-2xl font-black">點餐 ${item.price}</button>
                                    )}
                                </div>
                            </div>
                        ))}
                    </main>
                    {cart.length > 0 && (
                        <div className="fixed bottom-0 left-0 right-0 bg-white p-6 shadow-2xl border-t-4 border-orange-500 flex justify-between items-center z-50">
                            <span className="text-4xl font-black text-red-600">${cart.reduce((s,i)=>s+(i.unitPrice*i.count), 0)}</span>
                            <button onClick={()=>setView('cart')} className="bg-orange-600 text-white px-10 py-4 rounded-2xl text-2xl font-black">確認清單 ({cart.length})</button>
                        </div>
                    )}
                    {view === 'cart' && (
                        <div className="fixed inset-0 bg-black/60 z-[60] flex items-end">
                            <div className="bg-white w-full max-h-[85vh] rounded-t-[2rem] p-8 overflow-y-auto">
                                <div className="flex justify-between items-center mb-6 text-2xl font-black"><h2>您的訂單內容</h2><button onClick={()=>setView('menu')} className="text-4xl">&times;</button></div>
                                {cart.map(i => (
                                    <div key={i.cartId} className="flex justify-between items-center border-b py-4">
                                        <div className="text-xl font-bold">{i.displayName} <span className="text-sm text-gray-400">({i.spice})</span><br/>${i.unitPrice}</div>
                                        <button onClick={()=>{setCart(cart.filter(c=>c.cartId!==i.cartId))}} className="text-2xl text-red-400">🗑️</button>
                                    </div>
                                ))}
                                <button 
                                    onClick={submitOrder} 
                                    disabled={isSubmitting}
                                    className={`w-full py-6 rounded-2xl text-3xl font-black mt-8 text-white ${isSubmitting ? 'bg-gray-400' : 'bg-red-600'}`}>
                                    {isSubmitting ? '傳送中...' : '送出訂單'}
                                </button>
                            </div>
                        </div>
                    )}
                    {view === 'done' && (
                        <div className="fixed inset-0 bg-white z-[100] flex flex-col items-center justify-center p-8 text-center">
                            <div className="w-32 h-32 bg-green-100 text-green-600 rounded-full flex items-center justify-center text-6xl mb-6">✓</div>
                            <h2 className="text-4xl font-black text-red-700">下單成功!</h2>
                            <p className="text-xl mt-4">請告知店員您的桌號或編號</p>
                            <button onClick={()=>location.reload()} className="mt-12 text-gray-400 underline">返回首頁</button>
                        </div>
                    )}
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
