<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>永吉涼麵 - 點餐系統</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #FDFBF7; font-family: sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .tab-active { border-bottom: 4px solid #E67E22; color: #E67E22; font-weight: 900; }
        .spicy-btn-active { background-color: #C0392B !important; color: white !important; }
        @media print { .no-print { display: none !important; } }
        /* 鎖定畫面防止滾動 */
        .lock-screen { position: fixed; inset: 0; overflow: hidden; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const MENU_DATA = {
            "涼麵": [
                { name: "原味", pS: 50, pL: 60 }, { name: "芥末", pS: 50, pL: 60 },
                { name: "素食", pS: 50, pL: 60 }, { name: "雞絲", pS: 60, pL: 70 },
                { name: "三絲", pS: 60, pL: 70 }, { name: "炸醬", pS: 60, pL: 70 },
                { name: "泰式", pS: 65, pL: 75, fixed: "大辣" }
            ],
            "熱食": [
                { name: "炒麵", pS: 50, pL: 60 }, { name: "魯肉飯", pS: 45, pL: 55 },
                { name: "雞肉飯", pS: 45, pL: 55 }, { name: "味噌蛋麵", price: 65 }, { name: "炸醬麵", price: 60 }
            ],
            "湯類": [
                { name: "味噌", base: 25 }, { name: "紫菜", base: 25 },
                { name: "蘿蔔", base: 30 }, { name: "蛋花", base: 30 }, { name: "貢丸", base: 40 }
            ],
            "小菜": [
                { name: "魯蛋", price: 15 }, { name: "海帶", price: 10 }, { name: "小豆干", price: 10 },
                { name: "大豆干", price: 20 }, { name: "素雞", price: 15 }, { name: "蘿蔔", price: 15 },
                { name: "百頁", price: 20 }, { name: "麵腸", price: 20 }, { name: "素肚", price: 30 }, { name: "杏鮑菇", price: 30 }
            ]
        };

        const App = () => {
            const [view, setView] = useState('start');
            const [orderType, setOrderType] = useState('');
            const [tableNum, setTableNum] = useState('');
            const [people, setPeople] = useState(1);
            const [activeTab, setActiveTab] = useState('涼麵');
            const [cart, setCart] = useState([]);
            
            const [gSauce, setGSauce] = useState('蒜蓉醬油');
            const [gOnion, setGOnion] = useState('加蔥');
            const [gSpicy, setGSpicy] = useState('不辣');
            
            const [spicyPrefs, setSpicyPrefs] = useState({});
            const [counts, setCounts] = useState({});
            const [isSending, setIsSending] = useState(false);
            const [finishData, setFinishData] = useState(null);

            const handleAddToCart = (item, label = '', extra = '') => {
                const cKey = `${item.name}-${label}-${extra}`;
                const qty = counts[cKey] || 1;
                let unitP = item.price || item.base || (label === '大' ? item.pL : item.pS);
                if (extra === '加蛋') unitP = 40;
                if (extra === '加貢丸') unitP = 45;
                if (extra === '綜合') unitP = 60;

                const note = activeTab === '小菜' 
                    ? `(${gSauce}, ${gOnion}${orderType === '外帶' ? ', ' + gSpicy : ''})`
                    : `(${orderType === '外帶' ? (item.fixed || spicyPrefs[item.name] || '不辣') : '內用'})`;

                const existingIndex = cart.findIndex(i => i.title === `${item.name}${label}${extra}` && i.note === note);
                if (existingIndex > -1) {
                    const newCart = [...cart];
                    newCart[existingIndex].qty += qty;
                    setCart(newCart);
                } else {
                    setCart([...cart, { id: Date.now() + Math.random(), title: `${item.name}${label}${extra}`, unitP, qty, note }]);
                }
                setCounts({...counts, [cKey]: 1});
            };

            const updateCartQty = (id, delta) => {
                setCart(prev => prev.map(item => {
                    if (item.id === id) {
                        const newQty = Math.max(1, item.qty + delta);
                        return { ...item, qty: newQty };
                    }
                    return item;
                }));
            };

            const submitOrder = async () => {
                if (cart.length === 0) return;
                setIsSending(true);
                const orderId = "YJ" + (Math.floor(Math.random() * 899) + 100);
                const timeStr = new Date().toLocaleString('zh-TW');
                const final = {
                    type: orderType, table: tableNum, people,
                    items: cart.map(i => `${i.title}${i.note} x ${i.qty}`).join(', '),
                    total: cart.reduce((s, i) => s + (i.unitP * i.qty), 0),
                    orderId, time: timeStr, cart: [...cart]
                };
                setFinishData(final);
                try {
                    await fetch('https://script.google.com/macros/s/AKfycby4QS3nhpwUZYMFJBY5REXflTuzat3IPX6m2qKkOurpijIS1gQWpsxG3lFk9CUtQM62/exec', { 
                        method: 'POST', mode: 'no-cors', body: JSON.stringify({...final, key: "yongji888"}) 
                    });
                } catch(e) { console.error(e); }
                setView('finish');
                setIsSending(false);
            };

            if (view === 'start') return (
                <div className="flex flex-col items-center justify-center min-h-screen p-6 bg-[#FDFBF7]">
                    <div className="w-44 h-44 bg-red-700 rounded-full flex items-center justify-center text-white text-4xl font-black mb-16 shadow-2xl">永吉<br/>涼麵</div>
                    <div className="w-full max-w-xs space-y-6">
                        <button onClick={()=>{setOrderType('內用'); setView('table');}} className="w-full py-12 bg-white border-4 border-orange-500 text-orange-600 rounded-[2rem] text-5xl font-black shadow-lg">內用</button>
                        <button onClick={()=>{setOrderType('外帶'); setView('menu');}} className="w-full py-12 bg-orange-500 text-white rounded-[2rem] text-5xl font-black shadow-lg">外帶</button>
                    </div>
                </div>
            );

            if (view === 'table') return (
                <div className="flex flex-col items-center justify-center min-h-screen p-6">
                    <div className="bg-white p-8 rounded-[2.5rem] shadow-xl w-full max-w-sm border border-orange-100 text-center">
                        <h2 className="text-3xl font-black mb-6 text-orange-800">請輸入用餐人數</h2>
                        <input type="number" value={people} onChange={(e)=>setPeople(e.target.value)} className="w-full p-5 border-2 border-orange-500 rounded-2xl text-center text-4xl mb-8 outline-none" min="1" max="20" />
                        <h2 className="text-2xl font-black mb-4 text-gray-700">選擇桌號</h2>
                        <div className="grid grid-cols-4 gap-3">
                            {[1,2,3,5,6,7,8,9,10,11].map(n => (
                                <button key={n} onClick={()=>{setTableNum(n); setView('menu');}} className="py-5 bg-orange-50 border-2 border-orange-200 text-orange-700 rounded-2xl text-2xl font-black active:bg-orange-200">{n}</button>
                            ))}
                        </div>
                    </div>
                </div>
            );

            if (view === 'finish') return (
                <div className="min-h-screen bg-white p-6 flex flex-col items-center lock-screen">
                    <div className="text-center mb-8 no-print">
                        <div className="w-24 h-24 bg-green-100 text-green-600 rounded-full flex items-center justify-center text-5xl mx-auto mb-4">✓</div>
                        <h2 className="text-4xl font-black text-gray-800">訂單已送出</h2>
                        <p className="text-red-600 font-bold text-xl mt-2 animate-bounce">請至櫃台繳費，謝謝！</p>
                    </div>
                    
                    <div className="p-8 border-4 border-double border-gray-400 w-full max-w-sm bg-white font-mono shadow-sm">
                        <h3 className="text-3xl font-black text-center mb-1">永吉涼麵收據</h3>
                        <div className="text-center text-sm border-b-2 border-dashed pb-4 mb-5">
                            時間：{finishData.time}<br/>
                            <div className="mt-2 bg-gray-100 p-2 rounded">
                                <span className="text-gray-500 text-xs">流水號 (與順序無關)</span><br/>
                                <span className="text-5xl font-black text-red-700">{finishData.orderId}</span>
                            </div>
                        </div>
                        <div className="flex justify-between font-black mb-5 text-xl">
                            <span>{finishData.type}</span>
                            <span>{finishData.table ? finishData.table+'桌' : ''}</span>
                            <span>{finishData.people}人</span>
                        </div>
                        <div className="border-b-2 border-dashed pb-5 mb-5 space-y-4">
                            {finishData.cart.map(i => (
                                <div key={i.id} className="flex justify-between items-start">
                                    <div className="max-w-[75%]">
                                        <div className="font-black text-lg">{i.title} x {i.qty}</div>
                                        <div className="text-[11px] text-gray-500">{i.note}</div>
                                    </div>
                                    <div className="font-black">${i.unitP * i.qty}</div>
                                </div>
                            ))}
                        </div>
                        <div className="text-right text-4xl font-black text-red-700">總計：${finishData.total}</div>
                    </div>
                    
                    <div className="mt-10 flex gap-4 no-print">
                        <button onClick={()=>window.print()} className="bg-orange-500 text-white px-8 py-4 rounded-2xl font-black text-xl shadow-lg border-b-4 border-orange-700">列印單據</button>
                        <button onClick={()=>location.reload()} className="bg-gray-200 text-gray-600 px-8 py-4 rounded-2xl font-black text-xl border-b-4 border-gray-400">重新點餐</button>
                    </div>
                </div>
            );

            return (
                <div className="max-w-4xl mx-auto pb-44">
                    <header className="bg-white p-4 sticky top-0 z-50 shadow-md flex justify-between items-center text-red-700">
                        <h1 className="text-3xl font-black italic">永吉涼麵</h1>
                        <span className="bg-orange-100 text-orange-700 px-4 py-1 rounded-full font-bold text-sm">
                            {orderType} {tableNum ? `${tableNum}桌` : ''} / {people}人
                        </span>
                    </header>
                    
                    <nav className="flex bg-white sticky top-[72px] z-40 border-b shadow-sm overflow-x-auto no-print">
                        {Object.keys(MENU_DATA).map(tab => (
                            <button key={tab} onClick={()=>setActiveTab(tab)} className={`flex-1 py-5 text-2xl min-w-[100px] ${activeTab === tab ? 'tab-active' : 'text-gray-400 font-bold'}`}>{tab}</button>
                        ))}
                    </nav>

                    <main className="p-4 space-y-6">
                        {activeTab === '小菜' && (
                            <div className="bg-orange-600 p-6 rounded-[2rem] text-white shadow-xl space-y-4 border-4 border-orange-400 no-print">
                                <h3 className="font-black text-xl">🥗 小菜口味 (整盤統一)</h3>
                                <div className="grid grid-cols-3 gap-2">
                                    {['蒜蓉醬油','素醬油','不加醬'].map(s => <button key={s} onClick={()=>setGSauce(s)} className={`py-3 rounded-xl text-sm font-bold border-2 ${gSauce===s?'bg-white text-orange-600 border-white':'border-orange-400'}`}>{s}</button>)}
                                </div>
                                <div className="grid grid-cols-2 gap-2">
                                    {['加蔥','不加蔥'].map(o => <button key={o} onClick={()=>setGOnion(o)} className={`py-3 rounded-xl text-sm font-bold border-2 ${gOnion===o?'bg-white text-orange-600 border-white':'border-orange-400'}`}>{o}</button>)}
                                </div>
                                {orderType === '外帶' && (
                                    <div className="flex gap-2 overflow-x-auto pb-1">
                                        {['不辣','微辣','小辣','中辣','大辣'].map(s => <button key={s} onClick={()=>setGSpicy(s)} className={`px-4 py-3 rounded-xl text-xs font-bold border-2 whitespace-nowrap ${gSpicy===s?'bg-red-500 text-white border-white':'border-orange-400'}`}>{s}</button>)}
                                    </div>
                                )}
                            </div>
                        )}

                        {MENU_DATA[activeTab].map(item => (
                            <div key={item.name} className="bg-white p-6 rounded-[2rem] shadow-md border border-orange-50">
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="text-3xl font-black text-gray-800">{item.name}</h3>
                                    {orderType === '外帶' && (activeTab==='涼麵'||activeTab==='熱食') && !item.fixed && (
                                        <div className="flex gap-1">
                                            {['微','小','中','大'].map(s => <button key={s} onClick={()=>setSpicyPrefs({...spicyPrefs, [item.name]:s+'辣'})} className={`w-10 h-10 rounded-full border-2 font-bold text-xs ${(spicyPrefs[item.name]||'不辣')===s+'辣'?'spicy-btn-active':'text-gray-300'}`}>{s}</button>)}
                                        </div>
                                    )}
                                </div>
                                <div className="space-y-3">
                                    {(item.pS ? ['小','大'] : item.base ? ['單點','加蛋','加貢丸','綜合'] : ['']).map(lbl => {
                                        if (lbl==='綜合' && (item.name==='蛋花'||item.name==='貢丸')) return null;
                                        const k = `${item.name}-${lbl}-${(lbl==='加蛋'||lbl==='加貢丸'||lbl==='綜合')?lbl:''}`;
                                        const p = lbl==='大'?item.pL:lbl==='小'?item.pS:lbl==='加蛋'?40:lbl==='加貢丸'?45:lbl==='綜合'?60:(item.price||item.base);
                                        return (
                                            <div key={lbl} className="bg-gray-50 p-4 rounded-3xl flex items-center justify-between shadow-inner">
                                                <span className="text-xl font-black">{lbl} <span className="text-red-600 ml-1">${p}</span></span>
                                                <div className="flex items-center gap-4">
                                                    <div className="flex items-center bg-white rounded-full border-2 border-orange-200 px-3">
                                                        <button onClick={()=>setCounts({...counts, [k]: Math.max(1, (counts[k]||1)-1)})} className="w-10 h-10 text-3xl font-black text-orange-500">-</button>
                                                        <span className="w-8 text-center text-xl font-black">{counts[k] || 1}</span>
                                                        <button onClick={()=>setCounts({...counts, [k]: (counts[k]||1)+1})} className="w-10 h-10 text-3xl font-black text-orange-500">+</button>
                                                    </div>
                                                    <button onClick={()=>handleAddToCart(item, lbl, (lbl==='加蛋'||lbl==='加貢丸'||lbl==='綜合')?lbl:'')} className="bg-orange-500 text-white px-8 py-3 rounded-2xl font-black active:scale-95 transition-transform">加入</button>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        ))}
                    </main>

                    {cart.length > 0 && (
                        <div className="fixed bottom-8 left-6 right-6 no-print z-50">
                            <button onClick={()=>setView('cart')} className="w-full bg-red-700 text-white p-6 rounded-[2.5rem] shadow-2xl flex justify-between items-center px-10 border-4 border-red-800 active:scale-95 transition-transform">
                                <span className="text-3xl font-black">點餐清單 (${cart.reduce((s,i)=>s+(i.unitP*i.qty), 0)})</span>
                                <span className="bg-white text-red-700 w-12 h-12 rounded-full flex items-center justify-center font-black text-xl">
                                    {cart.reduce((s,i)=>s+i.qty, 0)}
                                </span>
                            </button>
                        </div>
                    )}

                    {view === 'cart' && (
                        <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-[100] flex items-end no-print">
                            <div className="bg-white w-full max-h-[85vh] rounded-t-[3.5rem] p-8 overflow-y-auto shadow-2xl">
                                <div className="flex justify-between items-center mb-8 border-b pb-4">
                                    <h2 className="text-3xl font-black text-gray-800">確認餐點內容</h2>
                                    <button onClick={()=>setView('menu')} className="text-6xl text-gray-300">&times;</button>
                                </div>
                                <div className="space-y-4 mb-10">
                                    {cart.map(i => (
                                        <div key={i.id} className="bg-gray-50 p-5 rounded-3xl border border-gray-100 shadow-sm">
                                            <div className="flex justify-between items-start mb-4">
                                                <div className="flex-1">
                                                    <div className="text-2xl font-black text-gray-700">{i.title}</div>
                                                    <div className="text-sm text-gray-400 font-bold">{i.note}</div>
                                                </div>
                                                <button onClick={()=>setCart(cart.filter(c=>c.id!==i.id))} className="text-4xl text-gray-300 ml-4 active:text-red-500">🗑️</button>
                                            </div>
                                            <div className="flex justify-between items-center">
                                                <span className="text-3xl font-black text-red-600">${i.unitP * i.qty}</span>
                                                <div className="flex items-center bg-white rounded-full border-2 border-orange-200 px-3">
                                                    <button onClick={()=>updateCartQty(i.id, -1)} className="w-14 h-14 text-4xl font-black text-gray-300">-</button>
                                                    <span className="w-12 text-center text-3xl font-black text-gray-700">{i.qty}</span>
                                                    <button onClick={()=>updateCartQty(i.id, 1)} className="w-14 h-14 text-4xl font-black text-orange-500">+</button>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <button onClick={submitOrder} disabled={isSending} className="w-full py-8 rounded-[2rem] text-4xl font-black text-white bg-orange-600 shadow-xl active:scale-95 transition-transform border-b-8 border-orange-800">
                                    {isSending ? '訂單處理中...' : '確認下單'}
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
