<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>永吉涼麵 - 專業點餐系統</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; background-color: #FDFBF7; color: #4A3728; }
        .tab-active { border-bottom: 5px solid #E67E22; color: #E67E22; font-weight: 900; }
        .price-big { font-size: 1.5rem; font-weight: 900; color: #C0392B; }
        .spicy-active { background-color: #C0392B !important; color: white !important; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const _p1 = 'https://script.google';
        const _p2 = '.com/macros/s/';
        const _p3 = 'AKfycby4QS3nhpwUZYMFJBY5REXflTuzat3IPX6m2qKkOurpijIS1gQWpsxG3lFk9CUtQM62'; 
        const _p4 = '/exec';
        const scriptURL = _p1 + _p2 + _p3 + _p4;

        const MENU_DATA = {
            "涼麵": [
                { name: "原味", pS: 50, pL: 60 }, { name: "芥末", pS: 50, pL: 60 },
                { name: "素食", pS: 50, pL: 60 }, { name: "雞絲", pS: 60, pL: 70 },
                { name: "三絲", pS: 60, pL: 70 }, { name: "炸醬", pS: 60, pL: 70 },
                { name: "泰式", pS: 65, pL: 75, fixedSpicy: "大辣" }
            ],
            "熱食": [
                { name: "炒麵", pS: 50, pL: 60 }, { name: "魯肉飯", pS: 45, pL: 55 },
                { name: "雞肉飯", pS: 45, pL: 55 }, { name: "味噌蛋麵", price: 65 }, { name: "炸醬麵", price: 60 }
            ],
            "湯類": [
                { name: "味噌", base: 25 }, { name: "紫菜", base: 25 },
                { name: "蘿蔔", base: 30 }, { name: "蛋花", base: 30 }, { name: "貢丸", base: 40 }
            ],
            "小菜": [
                { name: "魯蛋", price: 15 }, { name: "海帶", price: 10 }, { name: "小豆干", price: 10 },
                { name: "大豆干", price: 20 }, { name: "素雞", price: 15 }, { name: "蘿蔔", price: 15 },
                { name: "百頁", price: 20 }, { name: "麵腸", price: 20 }, { name: "素肚", price: 30 }, { name: "杏鮑菇", price: 30 }
            ]
        };

        const App = () => {
            const [view, setView] = useState('welcome');
            const [orderType, setOrderType] = useState('');
            const [tableNum, setTableNum] = useState('');
            const [peopleCount, setPeopleCount] = useState('');
            const [cart, setCart] = useState([]);
            const [activeTab, setActiveTab] = useState('涼麵');
            const [tempSpicy, setTempSpicy] = useState({});
            const [tempSauce, setTempSauce] = useState({}); // 醬料
            const [tempGreenOnion, setTempGreenOnion] = useState({}); // 蔥花
            const [itemCounts, setItemCounts] = useState({}); // 列表數量選擇
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [finalOrderInfo, setFinalOrderInfo] = useState(null);

            const addToCart = (item, sizeLabel = '', extra = '') => {
                let unitPrice = item.price || item.base || (sizeLabel === '大' ? item.pL : item.pS);
                if (extra === '加蛋') unitPrice = 40;
                if (extra === '加貢丸') unitPrice = 45;
                if (extra === '綜合') unitPrice = 60;
                
                const count = itemCounts[item.name + sizeLabel + extra] || 1;
                const sauce = activeTab === '小菜' ? (tempSauce[item.name] || '蒜蓉醬油') : '';
                const onion = activeTab === '小菜' ? (tempGreenOnion[item.name] || '加蔥') : '';
                
                setCart([...cart, {
                    cartId: Date.now() + Math.random(),
                    displayName: `${item.name}${sizeLabel}${extra}`,
                    unitPrice, 
                    count,
                    spice: orderType === '外帶' ? (item.fixedSpicy || tempSpicy[item.name] || '不辣') : '內用',
                    sauce: sauce,
                    onion: onion
                }]);
                // 重置該項數量回 1
                setItemCounts({...itemCounts, [item.name + sizeLabel + extra]: 1});
            };

            const updateCartCount = (cartId, delta) => {
                setCart(cart.map(c => c.cartId === cartId ? { ...c, count: Math.max(1, c.count + delta) } : c));
            };

            const submitOrder = async () => {
                setIsSubmitting(true);
                const orderId = "#" + (Math.floor(Math.random()*900)+100);
                const orderTime = new Date().toLocaleString('zh-TW');
                
                const orderData = {
                    key: "yongji888", 
                    orderType: orderType,
                    tableNum: tableNum,
                    people: peopleCount || 1,
                    items: cart.map(i => `${i.displayName}(${i.spice}${i.sauce ? ','+i.sauce : ''}${i.onion ? ','+i.onion : ''}) x ${i.count}`).join(', '),
                    totalPrice: cart.reduce((s,i)=>s+(i.unitPrice*i.count), 0),
                    orderId: orderId
                };

                setFinalOrderInfo({ ...orderData, time: orderTime, cart: [...cart] });

                try {
                    await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(orderData) });
                } catch (e) { console.error("提交失敗", e); }
                
                setView('done');
                setIsSubmitting(false);
            };

            if (view === 'welcome') return (
                <div className="flex flex-col items-center justify-center min-h-screen bg-[#FDFBF7]">
                    <div className="w-40 h-40 bg-red-700 rounded-full flex items-center justify-center text-white text-3xl font-bold mb-12 shadow-xl">永吉<br/>涼麵</div>
                    <div className="w-full max-w-sm space-y-6 px-6 text-center">
                        <button onClick={()=>{setOrderType('內用'); setView('table');}} className="w-full py-10 bg-white border-4 border-orange-500 text-orange-600 rounded-3xl text-4xl font-black shadow-lg">內用</button>
                        <button onClick={()=>{setOrderType('外帶'); setView('menu');}} className="w-full py-10 bg-orange-500 text-white rounded-3xl text-4xl font-black shadow-lg">外帶</button>
                    </div>
                </div>
            );

            if (view === 'table') return (
                <div className="flex flex-col items-center justify-center min-h-screen p-6">
                    <h2 className="text-3xl font-black mb-8">用餐設定</h2>
                    <div className="w-full max-w-md mb-8 bg-orange-50 p-6 rounded-2xl border-2 border-orange-200">
                        <label className="block mb-3 font-bold text-xl text-orange-800">1. 輸入人數：</label>
                        <input type="number" value={peopleCount} onChange={(e) => setPeopleCount(e.target.value)} placeholder="請輸入人數" className="w-full p-4 border-2 border-orange-500 rounded-xl text-2xl text-center"/>
                    </div>
                    <div className="grid grid-cols-4 gap-4 w-full max-w-md">
                        {[1,2,3,5,6,7,8,9,10,11].map(n => (
                            <button key={n} onClick={() => { if(!peopleCount) { alert("請輸入人數"); return; } setTableNum(n); setView('menu'); }} className="py-6 bg-white border-2 border-orange-500 text-orange-600 rounded-2xl text-2xl font-bold">{n}</button>
                        ))}
                    </div>
                </div>
            );

            const QuantitySelector = ({name}) => (
                <div className="flex items-center gap-4 mb-4">
                    <span className="font-bold">數量：</span>
                    <button onClick={() => setItemCounts({...itemCounts, [name]: Math.max(1, (itemCounts[name]||1)-1)})} className="w-10 h-10 bg-gray-200 rounded-full text-2xl font-bold">-</button>
                    <span className="text-2xl font-bold w-8 text-center">{itemCounts[name] || 1}</span>
                    <button onClick={() => setItemCounts({...itemCounts, [name]: (itemCounts[name]||1)+1})} className="w-10 h-10 bg-gray-200 rounded-full text-2xl font-bold">+</button>
                </div>
            );

            return (
                <div className="max-w-4xl mx-auto pb-40">
                    <header className="bg-white p-4 sticky top-0 z-50 shadow-md flex justify-between items-center no-print">
                        <span className="text-2xl font-black text-red-700">永吉涼麵</span>
                        <span className="bg-orange-100 px-4 py-1 rounded-full font-bold text-orange-700 text-sm">{orderType} {tableNum && `${tableNum}桌`} / {peopleCount}人</span>
                    </header>
                    <nav className="flex bg-white sticky top-[68px] z-40 border-b overflow-x-auto no-print">
                        {Object.keys(MENU_DATA).map(tab => (
                            <button key={tab} onClick={()=>setActiveTab(tab)} className={`flex-1 min-w-[80px] py-4 text-xl ${activeTab === tab ? 'tab-active' : 'text-gray-400'}`}>{tab}</button>
                        ))}
                    </nav>
                    <main className="p-4 space-y-4 no-print">
                        {MENU_DATA[activeTab].map(item => (
                            <div key={item.name} className="bg-white p-6 rounded-[2rem] shadow-sm border border-gray-100">
                                <h3 className="text-3xl font-black mb-4">{item.name}</h3>
                                
                                {activeTab === '小菜' && (
                                    <div className="mb-4 space-y-3">
                                        <div className="flex gap-2">
                                            {['蒜蓉醬油','素醬油','不加醬'].map(s => (
                                                <button key={s} onClick={()=>setTempSauce({...tempSauce, [item.name]:s})} className={`flex-1 py-2 text-xs border rounded-lg ${(tempSauce[item.name]||'蒜蓉醬油')===s?'spicy-active':'bg-white'}`}>{s}</button>
                                            ))}
                                        </div>
                                        <div className="flex gap-2">
                                            {['加蔥','不加蔥'].map(o => (
                                                <button key={o} onClick={()=>setTempGreenOnion({...tempGreenOnion, [item.name]:o})} className={`flex-1 py-2 text-xs border rounded-lg ${(tempGreenOnion[item.name]||'加蔥')===o?'spicy-active':'bg-white'}`}>{o}</button>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {orderType === '外帶' && (activeTab==='涼麵'||activeTab==='熱食') && !item.fixedSpicy && (
                                    <div className="flex gap-1 mb-4">
                                        {['大辣','中辣','小辣','微辣','不辣'].map(s => (
                                            <button key={s} onClick={()=>setTempSpicy({...tempSpicy, [item.name]:s})} className={`flex-1 py-2 rounded-lg text-xs border ${ (tempSpicy[item.name] || '不辣') === s ? 'spicy-active' : 'bg-white' }`}>{s}</button>
                                        ))}
                                    </div>
                                )}
                                
                                <div className="mt-4">
                                    {item.pS ? (
                                        ['大','小'].map(size => (
                                            <div key={size} className="mb-4 p-4 bg-gray-50 rounded-2xl">
                                                <div className="flex justify-between items-center mb-2">
                                                    <span className="text-xl font-bold">{size}份 - ${size==='大'?item.pL:item.pS}</span>
                                                </div>
                                                <QuantitySelector name={item.name+size} />
                                                <button onClick={()=>addToCart(item, size)} className="w-full bg-orange-500 text-white py-3 rounded-xl font-bold">加入購物車</button>
                                            </div>
                                        ))
                                    ) : item.base ? (
                                        <div className="space-y-4">
                                            {['單點','加蛋','加貢丸','綜合'].map(ex => {
                                                if((ex==='綜合') && (item.name==='蛋花'||item.name==='貢丸')) return null;
                                                return (
                                                    <div key={ex} className="p-4 bg-gray-50 rounded-2xl">
                                                        <span className="block font-bold mb-2">{ex}</span>
                                                        <QuantitySelector name={item.name+ex} />
                                                        <button onClick={()=>addToCart(item, '', ex==='單點'?'':ex)} className="w-full bg-orange-500 text-white py-3 rounded-xl font-bold">加入購物車</button>
                                                    </div>
                                                )
                                            })}
                                        </div>
                                    ) : (
                                        <div className="p-4 bg-gray-50 rounded-2xl">
                                            <QuantitySelector name={item.name} />
                                            <button onClick={()=>addToCart(item)} className="w-full bg-orange-600 text-white py-5 rounded-2xl text-2xl font-black">加入購物車 ${item.price}</button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        ))}
                    </main>

                    {cart.length > 0 && view !== 'cart' && view !== 'done' && (
                        <div className="fixed bottom-0 left-0 right-0 bg-white p-6 shadow-2xl border-t-4 border-orange-500 flex justify-between items-center z-50 no-print">
                            <span className="text-4xl font-black text-red-600">${cart.reduce((s,i)=>s+(i.unitPrice*i.count), 0)}</span>
                            <button onClick={()=>setView('cart')} className="bg-orange-600 text-white px-10 py-4 rounded-2xl text-2xl font-black">確認清單 ({cart.length})</button>
                        </div>
                    )}

                    {view === 'cart' && (
                        <div className="fixed inset-0 bg-black/60 z-[60] flex items-end no-print">
                            <div className="bg-white w-full max-h-[85vh] rounded-t-[2rem] p-8 overflow-y-auto">
                                <div className="flex justify-between items-center mb-6 text-2xl font-black"><h2>您的訂單內容</h2><button onClick={()=>setView('menu')} className="text-4xl">&times;</button></div>
                                {cart.map(i => (
                                    <div key={i.cartId} className="border-b py-4">
                                        <div className="flex justify-between items-start mb-2">
                                            <div className="text-xl font-bold">{i.displayName} <span className="text-sm text-gray-400">({i.spice}{i.sauce?','+i.sauce:''}{i.onion?','+i.onion:''})</span></div>
                                            <button onClick={()=>{setCart(cart.filter(c=>c.cartId!==i.cartId))}} className="text-xl">🗑️</button>
                                        </div>
                                        <div className="flex justify-between items-center">
                                            <div className="flex items-center gap-4">
                                                <button onClick={()=>updateCartCount(i.cartId, -1)} className="w-8 h-8 bg-gray-100 rounded-full">-</button>
                                                <span className="font-bold text-xl">{i.count}</span>
                                                <button onClick={()=>updateCartCount(i.cartId, 1)} className="w-8 h-8 bg-gray-100 rounded-full">+</button>
                                            </div>
                                            <div className="text-xl font-black text-red-600">${i.unitPrice * i.count}</div>
                                        </div>
                                    </div>
                                ))}
                                <button onClick={submitOrder} disabled={isSubmitting} className="w-full py-6 rounded-2xl text-3xl font-black mt-8 text-white bg-red-600">
                                    {isSubmitting ? '傳送中...' : '送出訂單'}
                                </button>
                            </div>
                        </div>
                    )}

                    {view === 'done' && finalOrderInfo && (
                        <div className="min-h-screen bg-white p-8 flex flex-col items-center">
                            <div className="no-print flex flex-col items-center">
                                <div className="w-24 h-24 bg-green-100 text-green-600 rounded-full flex items-center justify-center text-4xl mb-4">✓</div>
                                <h2 className="text-3xl font-black text-red-700">下單成功!</h2>
                                <button onClick={()=>window.print()} className="mt-4 bg-orange-500 text-white px-6 py-2 rounded-lg font-bold">列印單據</button>
                            </div>
                            
                            {/* 列印/顯示區域 */}
                            <div className="mt-8 p-6 border-2 border-dashed border-gray-300 w-full max-w-sm rounded-xl bg-white shadow-sm">
                                <h3 className="text-2xl font-black text-center mb-2">永吉涼麵 點餐單</h3>
                                <div className="text-sm text-gray-500 text-center mb-4 border-b pb-2">
                                    {finalOrderInfo.time}<br/>
                                    流水號：<span className="text-xl font-bold text-black">{finalOrderInfo.orderId}</span><br/>
                                    (此為隨機編號，與出餐順序無關)
                                </div>
                                <div className="space-y-2 mb-4">
                                    <div className="flex justify-between font-bold"><span>類型：{finalOrderInfo.orderType}</span><span>桌號：{finalOrderInfo.tableNum||'--'}</span></div>
                                    <div className="font-bold">人數：{finalOrderInfo.people} 人</div>
                                </div>
                                <div className="border-t border-b py-4 space-y-3">
                                    {finalOrderInfo.cart.map(item => (
                                        <div key={item.cartId} className="flex justify-between items-start">
                                            <div className="text-sm">
                                                <div className="font-bold">{item.displayName} x {item.count}</div>
                                                <div className="text-xs text-gray-500">{item.spice}{item.sauce?','+item.sauce:''}{item.onion?','+item.onion:'' || ''}</div>
                                            </div>
                                            <div className="font-bold">${item.unitPrice * item.count}</div>
                                        </div>
                                    ))}
                                </div>
                                <div className="text-right pt-4 text-2xl font-black">總計：${finalOrderInfo.totalPrice}</div>
                                <div className="mt-6 text-center text-xs text-gray-400">謝謝光臨，請至櫃檯結帳</div>
                            </div>
                            <button onClick={()=>location.reload()} className="mt-8 text-gray-400 underline no-print">返回首頁</button>
                        </div>
                    )}
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
