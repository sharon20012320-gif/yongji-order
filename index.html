<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>永吉涼麵 - 專業點餐系統</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; background-color: #FDFBF7; color: #4A3728; }
        .tab-active { border-bottom: 5px solid #E67E22; color: #E67E22; font-weight: 900; }
        .price-big { font-size: 1.5rem; font-weight: 900; color: #C0392B; }
        .spicy-active { background-color: #C0392B !important; color: white !important; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        // URL 混淆處理
        const _p1 = 'https://script.google';
        const _p2 = '.com/macros/s/';
        const _p3 = 'AKfycby4QS3nhpwUZYMFJBY5REXflTuzat3IPX6m2qKkOurpijIS1gQWpsxG3lFk9CUtQM62'; 
        const _p4 = '/exec';
        const scriptURL = _p1 + _p2 + _p3 + _p4;

        const MENU_DATA = {
            "涼麵": [
                { name: "原味", pS: 50, pL: 60 }, { name: "芥末", pS: 50, pL: 60 },
                { name: "素食", pS: 50, pL: 60 }, { name: "雞絲", pS: 60, pL: 70 },
                { name: "三絲", pS: 60, pL: 70 }, { name: "炸醬", pS: 60, pL: 70 },
                { name: "泰式", pS: 65, pL: 75, fixedSpicy: "大辣" }
            ],
            "熱食": [
                { name: "炒麵", pS: 50, pL: 60 }, { name: "魯肉飯", pS: 45, pL: 55 },
                { name: "雞肉飯", pS: 45, pL: 55 }, { name: "味噌蛋麵", price: 65 }, { name: "炸醬麵", price: 60 }
            ],
            "湯類": [
                { name: "味噌", base: 25 }, { name: "紫菜", base: 25 },
                { name: "蘿蔔", base: 30 }, { name: "蛋花", base: 30 }, { name: "貢丸", base: 40 }
            ],
            "小菜": [
                { name: "魯蛋", price: 15 }, { name: "海帶", price: 10 }, { name: "小豆干", price: 10 },
                { name: "大豆干", price: 20 }, { name: "素雞", price: 15 }, { name: "蘿蔔", price: 15 },
                { name: "百頁", price: 20 }, { name: "麵腸", price: 20 }, { name: "素肚", price: 30 }, { name: "杏鮑菇", price: 30 }
            ]
        };

        const App = () => {
            const [view, setView] = useState('welcome');
            const [orderType, setOrderType] = useState('');
            const [tableNum, setTableNum] = useState('');
            const [peopleCount, setPeopleCount] = useState(1);
            const [cart, setCart] = useState([]);
            const [activeTab, setActiveTab] = useState('涼麵');
            const [tempSpicy, setTempSpicy] = useState({});
            const [tempSauce, setTempSauce] = useState({}); // 小菜醬料
            const [tempGreenOnion, setTempGreenOnion] = useState({}); // 小菜蔥花
            const [itemCounts, setItemCounts] = useState({}); // 商品選擇數量
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [finalOrderInfo, setFinalOrderInfo] = useState(null);

            const addToCart = (item, sizeLabel = '', extra = '') => {
                let unitPrice = item.price || item.base || (sizeLabel === '大' ? item.pL : item.pS);
                if (extra === '加蛋') unitPrice = 40;
                if (extra === '加貢丸') unitPrice = 45;
                if (extra === '綜合') unitPrice = 60;
                
                const countKey = `${item.name}-${sizeLabel}-${extra}`;
                const currentCount = itemCounts[countKey] || 1;
                
                const spice = orderType === '外帶' ? (item.fixedSpicy || tempSpicy[item.name] || '不辣') : '內用';
                const sauce = activeTab === '小菜' ? (tempSauce[item.name] || '蒜蓉醬油') : '';
                const onion = activeTab === '小菜' ? (tempGreenOnion[item.name] || '加蔥') : '';

                setCart([...cart, {
                    cartId: Date.now() + Math.random(),
                    displayName: `${item.name}${sizeLabel}${extra}`,
                    unitPrice,
                    count: currentCount,
                    spice, sauce, onion
                }]);
                
                // 重置該項數量
                setItemCounts({...itemCounts, [countKey]: 1});
            };

            const changeItemCount = (key, delta) => {
                const current = itemCounts[key] || 1;
                setItemCounts({...itemCounts, [key]: Math.max(1, current + delta)});
            };

            const submitOrder = async () => {
                setIsSubmitting(true);
                const orderId = "#" + (Math.floor(Math.random()*900)+100);
                const orderTime = new Date().toLocaleString('zh-TW');
                
                const orderData = {
                    key: "yongji888", 
                    orderType, tableNum, people: peopleCount,
                    items: cart.map(i => `${i.displayName}(${i.spice}${i.sauce ? ','+i.sauce : ''}${i.onion ? ','+i.onion : ''}) x ${i.count}`).join(', '),
                    totalPrice: cart.reduce((s,i)=>s+(i.unitPrice*i.count), 0),
                    orderId: orderId
                };

                setFinalOrderInfo({ ...orderData, time: orderTime, cart: [...cart] });

                try {
                    await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(orderData) });
                } catch (e) { console.error(e); }
                
                setView('done');
                setIsSubmitting(false);
            };

            if (view === 'welcome') return (
                <div className="flex flex-col items-center justify-center min-h-screen bg-[#FDFBF7]">
                    <div className="w-40 h-40 bg-red-700 rounded-full flex items-center justify-center text-white text-3xl font-bold mb-12">永吉<br/>涼麵</div>
                    <div className="w-full max-w-sm space-y-6 px-6">
                        <button onClick={()=>{setOrderType('內用'); setView('table');}} className="w-full py-10 bg-white border-4 border-orange-500 text-orange-600 rounded-3xl text-4xl font-black">內用</button>
                        <button onClick={()=>{setOrderType('外帶'); setView('menu');}} className="w-full py-10 bg-orange-500 text-white rounded-3xl text-4xl font-black">外帶</button>
                    </div>
                </div>
            );

            if (view === 'table') return (
                <div className="flex flex-col items-center justify-center min-h-screen p-6 text-center">
                    <h2 className="text-3xl font-black mb-8">請輸入用餐人數並選擇桌號</h2>
                    <div className="mb-8 w-full max-w-xs">
                        <label className="block mb-2 font-bold">用餐人數：</label>
                        <input type="number" value={peopleCount} onChange={(e)=>setPeopleCount(e.target.value)} className="w-full p-4 border-2 border-orange-500 rounded-xl text-center text-2xl" min="1" />
                    </div>
                    <div className="grid grid-cols-4 gap-4 w-full max-w-md">
                        {[1,2,3,5,6,7,8,9,10,11].map(n => (
                            <button key={n} onClick={()=>{setTableNum(n); setView('menu');}} className="py-6 bg-white border-2 border-orange-500 text-orange-600 rounded-2xl text-2xl font-bold">{n}</button>
                        ))}
                    </div>
                </div>
            );

            return (
                <div className="max-w-4xl mx-auto pb-40">
                    <header className="bg-white p-4 sticky top-0 z-50 shadow-md flex justify-between items-center no-print">
                        <span className="text-2xl font-black text-red-700">永吉涼麵</span>
                        <span className="bg-orange-100 px-4 py-1 rounded-full font-bold text-orange-700">{orderType} {tableNum && `${tableNum}桌`} / {peopleCount}人</span>
                    </header>
                    <nav className="flex bg-white sticky top-[68px] z-40 border-b overflow-x-auto no-print">
                        {Object.keys(MENU_DATA).map(tab => (
                            <button key={tab} onClick={()=>setActiveTab(tab)} className={`flex-1 min-w-[80px] py-4 text-xl ${activeTab === tab ? 'tab-active' : 'text-gray-400'}`}>{tab}</button>
                        ))}
                    </nav>
                    <main className="p-4 space-y-4 no-print">
                        {MENU_DATA[activeTab].map(item => (
                            <div key={item.name} className="bg-white p-6 rounded-[2rem] shadow-sm border border-gray-100">
                                <h3 className="text-2xl font-black mb-3">{item.name}</h3>
                                
                                {activeTab === '小菜' && (
                                    <div className="mb-4 space-y-2">
                                        <div className="flex gap-1">
                                            {['蒜蓉醬油','素醬油','不加醬'].map(s => (
                                                <button key={s} onClick={()=>setTempSauce({...tempSauce, [item.name]:s})} className={`flex-1 py-2 text-xs border rounded-lg ${(tempSauce[item.name]||'蒜蓉醬油')===s?'spicy-active':'bg-white'}`}>{s}</button>
                                            ))}
                                        </div>
                                        <div className="flex gap-1">
                                            {['加蔥','不加蔥'].map(o => (
                                                <button key={o} onClick={()=>setTempGreenOnion({...tempGreenOnion, [item.name]:o})} className={`flex-1 py-2 text-xs border rounded-lg ${(tempGreenOnion[item.name]||'加蔥')===o?'spicy-active':'bg-white'}`}>{o}</button>
                                            ))}
                                        </div>
                                    </div>
